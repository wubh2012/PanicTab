<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aw, Snap!</title>
    <link rel="stylesheet" href="page.css">
  </head>
  <body>
    <main id="crashView" class="crash-view">
      <div class="crash-icon" aria-hidden="true">:(</div>
      <h1>Aw, Snap!</h1>
      <p>Something went wrong while displaying this webpage.</p>
      <p class="muted">Error code: STATUS_ACCESS_VIOLATION</p>
      <button id="reloadButton" type="button">Reload</button>
    </main>

    <main id="imageView" class="image-view" hidden>
      <img id="customImage" alt="Disguise">
    </main>

    <script src="page.js"></script>
  </body>
</html>
